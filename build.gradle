plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
	id 'com.gradleup.shadow' version '8.3.0'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
	maven { url 'https://jitpack.io' }
	maven { url 'https://maven.wispforest.io/releases/' }
	maven {
		url "https://api.modrinth.com/maven"
	}
	flatDir {
		dirs "./lib"
	}
}

configurations.all {
	// Force all DJL artifacts to 0.27.0 to prevent transitive upgrades
	// (0.27.0 is the first version with a published osx-x86_64 JNI lib for PyTorch 2.1.2)
	resolutionStrategy {
		force "ai.djl:api:0.27.0"
		force "ai.djl.pytorch:pytorch-engine:0.27.0"
		force "ai.djl.pytorch:pytorch-model-zoo:0.27.0"
		force "ai.djl.huggingface:tokenizers:0.27.0"
	}
}

fabricApi {
	configureDataGeneration()
}

loom {
	runs {
		client {
			ideConfigGenerated true
			runDir "run"
		}
	}
}

dependencies {
	// Core Minecraft/Fabric
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	testImplementation platform('org.junit:junit-bom:5.10.3')
	testImplementation 'org.junit.jupiter:junit-jupiter'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	// Core application dependencies
	implementation 'com.github.amithkoujalgi:ollama4j:1.0.77'
	implementation 'com.github.FasterXML:jackson-core:jackson-core-2.17.2'
	implementation 'com.github.FasterXML:jackson-databind:jackson-databind-2.17.2'
	implementation 'com.github.FasterXML:jackson-datatype-jsr310:jackson-datatype-jsr310-2.8.4'
	implementation 'com.github.FasterXML:jackson-annotations:jackson-annotations-2.17.2'
	implementation "org.xerial:sqlite-jdbc:3.50.2.0"
	implementation 'org.apache.commons:commons-math3:3.6.1'
	// https://mvnrepository.com/artifact/org.apache.commons/commons-compress
	implementation 'org.apache.commons:commons-compress:1.28.0'
	implementation 'org.jsoup:jsoup:1.21.1'

	// DJL dependencies
	implementation "ai.djl:api:0.27.0"
	implementation "ai.djl.huggingface:tokenizers:0.27.0"
	implementation "ai.djl.pytorch:pytorch-engine:0.27.0"
	implementation "ai.djl.pytorch:pytorch-native-cpu:2.1.2:osx-x86_64"
	implementation "ai.djl.pytorch:pytorch-model-zoo:0.27.0"

	// OpenNLP ONLY - No Stanford CoreNLP!
	implementation 'org.apache.opennlp:opennlp-tools:2.5.5'


	// Include statements for runtime
	include "com.github.amithkoujalgi:ollama4j:1.0.77"
	include "com.github.FasterXML:jackson-databind:jackson-databind-2.17.2"
	include "com.github.FasterXML:jackson-core:jackson-core-2.17.2"
	include "com.github.FasterXML:jackson-datatype-jsr310:jackson-datatype-jsr310-2.8.4"
	include "com.github.FasterXML:jackson-annotations:jackson-annotations-2.17.2"
	include "org.xerial:sqlite-jdbc:3.50.2.0"
	include 'org.apache.commons:commons-math3:3.6.1'
	include "org.apache.commons:commons-compress:1.28.0"
	include 'org.jsoup:jsoup:1.21.1'
	include "ai.djl:api:0.27.0"
	include "ai.djl.huggingface:tokenizers:0.27.0"
	include "ai.djl.pytorch:pytorch-engine:0.27.0"
	include "ai.djl.pytorch:pytorch-native-cpu:2.1.2:osx-x86_64"
	include "ai.djl.pytorch:pytorch-model-zoo:0.27.0"
	include 'org.apache.opennlp:opennlp-tools:2.5.5'

	dependencies {
		implementation fileTree(dir: 'libs', include: ['*.jar'])
	}
}

shadowJar {
	dependencies {
		include(dependency('com.fasterxml.jackson.core:jackson-databind'))
		include(dependency("com.github.amithkoujalgi:ollama4j:1.0.77"))
	}
	relocate 'com.fasterxml.jackson', 'net.shasankp000.relocated.com.fasterxml.jackson'
	relocate 'com.github.amithkoujalgi', 'net.shasankp000.relocated:com.github.amithkoujalgi'
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

test {
	useJUnitPlatform()
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.base.archivesName.get()}"}
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
	repositories {
		// Add repositories to publish to here.
	}
}

// Minimal JVM configuration - no complex XML parsing needed
tasks.withType(JavaExec).configureEach {
	if (name.contains("run")) {
		// Basic module access for Java 17+
		jvmArgs += "--add-opens=java.base/java.lang=ALL-UNNAMED"
		jvmArgs += "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED"

		// Performance
		jvmArgs += "-Xmx4G"
		jvmArgs += "-Xms2G"

		// Tell DJL to use a local cache dir so it doesn't re-download JNI libs
		systemProperty 'DJL_CACHE_DIR', "${rootDir}/.djl.ai"
		// Prevent DJL from trying to check for updates online
		systemProperty 'offline', 'true'
	}
}
